name: EAS Build APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install
      - name: Build APK
        run: eas build --platform android --profile preview --local --output ./build-android/app-release.apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./build-android/app-release.apk
