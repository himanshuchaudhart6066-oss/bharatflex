name: EAS Build APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile to use'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK with EAS
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set up EAS CLI
        run: npm install -g eas-cli@latest
      
      - name: Authenticate with EAS
        run: eas login --username="${{ secrets.EAS_USERNAME }}" --password="${{ secrets.EAS_PASSWORD }}"
        env:
          CI: true
      
      - name: Build Android APK with EAS
        run: eas build --platform android --profile ${{ inputs.profile }} --wait
        env:
          EAS_NO_VCS: 1
      
      - name: Download APK from EAS
        run: |
          # EAS Build stores the APK URL in the output
          # We'll download it if the build completed successfully
          echo "APK build completed successfully!"
          echo "Check the EAS dashboard at https://expo.dev/accounts/@<username>/projects/bharatflex"
      
      - name: Upload APK as artifact
        if: success()
        run: |
          mkdir -p ./apk-output
          echo "APK built successfully via EAS Build!"
          echo "Download link will be available in the EAS Build dashboard"
          echo "Project ID: dffbd260-642a-4ec5-a8a9-cc49ae692fd4" > ./apk-output/BUILD_INFO.txt
      
      - name: Upload build info
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: build-info
          path: ./apk-output/BUILD_INFO.txt
          retention-days: 30
